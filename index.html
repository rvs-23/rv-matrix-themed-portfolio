<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rv's Matrix Terminal Portfolio</title>
    <meta name="description" content="Interactive Matrix-themed terminal portfolio of Rishav Sharma — Data Scientist & Software Developer. Explore skills, projects, and more through a command-line interface." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rv's Matrix Terminal Portfolio" />
    <meta property="og:description" content="A Matrix-themed interactive terminal portfolio. Type commands to explore." />
    <meta property="og:image" content="/favicon/rv-matrix-style-favicon-1.png" />
    <meta name="twitter:card" content="summary" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/themes.css" />

    <link
      rel="icon"
      href="/favicon/rv-matrix-style-favicon-1.png"
      type="image/png"
    />
  </head>

  <body class="theme-green">
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-text" id="decrypt-status">INITIALIZING...</div>
        <div class="loading-text matrix-chars" id="matrix-loader-chars"></div>
        <div class="spinner"></div>
      </div>
    </div>

    <canvas id="matrix-canvas"></canvas>

    <noscript>
      <div class="noscript-fallback">
        <h1>Rv's Matrix Terminal Portfolio</h1>
        <p>This interactive portfolio requires JavaScript to run.</p>
        <p>Contact: <a href="mailto:23rishavsharma@gmail.com" class="noscript-link">23rishavsharma@gmail.com</a></p>
      </div>
    </noscript>

    <div id="contentContainer" class="content-container">
      <div class="terminal-titlebar" aria-hidden="true">
        <span class="terminal-dot"></span>
        <span class="terminal-dot"></span>
        <span class="terminal-dot"></span>
      </div>
      <pre id="terminal-output" role="log" aria-live="polite" aria-label="Terminal output"></pre>
      <div class="prompt-line">
        <span class="prompt-arrow">$</span>
        <label for="command-input" class="sr-only">Terminal command input</label>
        <input
          type="text"
          id="command-input"
          autocomplete="off"
          spellcheck="false"
          aria-label="Terminal command input"
        />
      </div>
    </div>

    <nav class="minimal-nav">
      <a
        href="#"
        class="nav-icon"
        id="nav-toggle-term"
        aria-label="Toggle terminal"
      >
        <i class="fas fa-terminal"></i>
        <span class="nav-label">Terminal</span>
      </a>
      <a
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        class="nav-icon"
        id="nav-linkedin-link"
        aria-label="LinkedIn"
      >
        <i class="fab fa-linkedin-in"></i>
        <span class="nav-label">LinkedIn</span>
      </a>
      <a
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        class="nav-icon"
        id="nav-github-link"
        aria-label="GitHub"
      >
        <i class="fab fa-github"></i>
        <span class="nav-label">GitHub</span>
      </a>
      <a href="#" class="nav-icon" id="nav-email-link" aria-label="Email">
        <i class="fas fa-envelope"></i>
        <span class="nav-label">Email</span>
      </a>
      <a
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        class="nav-icon nav-icon--hidden"
        id="nav-medium-link"
        aria-label="Medium"
      >
        <i class="fab fa-medium-m"></i>
        <span class="nav-label">Medium</span>
      </a>
      <a
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        class="nav-icon"
        id="nav-cv-link"
        aria-label="Download CV"
      >
        <i class="fas fa-file-arrow-down"></i>
        <span class="nav-label">CV</span>
      </a>
    </nav>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
